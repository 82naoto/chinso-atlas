<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>珍走ATLAS｜メンテナンス中</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Bebas+Neue&display=swap');
:root{--ink:#14181f;--paper:#f4f1ea;--line:#2a3340;--hot:#ff5430;--cool:#1f6feb;--gold:#e8b13c;--muted:#7b8494;--ok:#34c759;--card:#1b212b;--ring:#9b6dff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--ink);color:var(--paper);min-height:100vh;line-height:1.6;display:flex;flex-direction:column;
 background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.025) 39px,rgba(255,255,255,.025) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.025) 39px,rgba(255,255,255,.025) 40px);}
.wrap{max-width:780px;width:100%;margin:0 auto;padding:24px 16px 90px;flex:1;display:flex;flex-direction:column;}

header{border-bottom:3px solid var(--hot);padding-bottom:14px;margin-bottom:22px;}
.kicker{font-family:'Bebas Neue';letter-spacing:.22em;color:var(--hot);font-size:.95rem;}
h1{font-weight:900;font-size:1.7rem;letter-spacing:.02em;line-height:1.18;}

/* メンテナンス表記 */
.maint{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 10px;}
.maint-tag{font-family:'Bebas Neue';letter-spacing:.18em;font-size:1rem;color:var(--gold);background:rgba(232,177,60,.08);border:1px solid var(--gold);border-radius:20px;padding:5px 16px;margin-bottom:22px;}
.maint-title{font-size:1.5rem;font-weight:900;margin-bottom:14px;}
.maint-body{font-size:.92rem;color:var(--muted);line-height:1.9;max-width:30em;}

footer{text-align:center;font-family:'Bebas Neue';letter-spacing:.16em;color:var(--muted);font-size:.85rem;padding-bottom:10px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">珍走ATLAS — CHINSO ATLAS</div>
    <h1>首都高を「賢く」使う<br>非公式ツール集</h1>
  </header>

  <div class="maint">
    <div class="maint-tag">UNDER MAINTENANCE</div>
    <div class="maint-title">ただいまメンテナンス中です</div>
    <div class="maint-body">
      現在、サイトのメンテナンスを実施しています。<br>
      ご不便をおかけしますが、しばらくお待ちください。
    </div>
  </div>

  <footer>CHINSO ATLAS</footer>
</div>
</body>
</html>
